name: CI
on:
  pull_request:
    branches:
      - main
      - dev
jobs:
  run-linter-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm i

      - name: Lint code
        run: npm run lint

      - name: Test code
        run: npm run test

      - name: Run build
        run: npm run build
